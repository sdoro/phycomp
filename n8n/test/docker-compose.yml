
services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - TZ=Europe/Rome
      - HOST_USER=${USER}
    volumes:
      # Questa riga mappa esattamente la tua cartella attuale (~/.n8n) nel container
      #- ~/.n8n:/home/node/.n8n
      - /home/${USER}/.n8n:/home/node/.n8n
    restart: unless-stopped
